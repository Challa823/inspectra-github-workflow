# ─────────────────────────────────────────────
# Challachandras Host Configuration
# ─────────────────────────────────────────────

challachandras:
  host: www.challachandrababunaidu.com
  base-url: https://www.challachandrababunaidu.com
  api-url: https://www.challachandrababunaidu.com/api/v1
  auth-url: https://www.challachandrababunaidu.com/auth

chandras:
  host: iam.challachandrababunaidu.com
  base-url: https://iam.challachandrababunaidu.com
  api-url: https://iam.challachandrababunaidu.com/api/v1
  token-url: https://iam.challachandrababunaidu.com/oauth2/token
  jwks-url: https://iam.challachandrababunaidu.com/.well-known/jwks.json

app:
  name: inspectra
  env: production

server:
  port: 8080
  ssl:
    enabled: true
    protocol: TLS
    enabled-protocols:
      - TLSv1.2
      - TLSv1.3
