# ─────────────────────────────────────────────
# Challachandras Host Configuration
# ─────────────────────────────────────────────

# Challachandras host
challachandrashost=www.challachandrababunaidu.com
challachandras.base-url=https://www.challachandrababunaidu.com
challachandras.api-url=https://www.challachandrababunaidu.com/api/v1
challachandras.auth-url=https://www.challachandrababunaidu.com/auth

# Chandras host
chandrashost=iam.challachandrababunaidu.com
chandras.base-url=https://iam.challachandrababunaidu.com
chandras.api-url=https://iam.challachandrababunaidu.com/api/v1
chandras.token-url=https://iam.challachandrababunaidu.com/oauth2/token
chandras.jwks-url=https://iam.challachandrababunaidu.com/.well-known/jwks.json

# Application settings
app.name=inspectra
app.env=production
server.port=8080

# TLS settings
server.ssl.enabled=true
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3
