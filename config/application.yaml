# ─────────────────────────────────────────────
# VithMinds & Chandras Host Configuration
# ─────────────────────────────────────────────

vithminds:
  host: www.vithminds.com
  base-url: https://www.vithminds.com
  api-url: https://www.vithminds.com/api/v1
  auth-url: https://www.vithminds.com/auth

chandras:
  host: iam.challachandrababunaidu.com
  base-url: https://iam.challachandrababunaidu.com
  api-url: https://iam.challachandrababunaidu.com/api/v1
  token-url: https://iam.challachandrababunaidu.com/oauth2/token
  jwks-url: https://iam.challachandrababunaidu.com/.well-known/jwks.json

app:
  name: inspectra
  env: staging

server:
  port: 8443
  ssl:
    enabled: true
    protocol: TLS
    enabled-protocols:
      - TLSv1.2
      - TLSv1.3
